services:
  - type: web
    name: wizard-arena
    runtime: python
    plan: free
    branch: master
    buildCommand: bash scripts/render-build.sh
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NODE_VERSION
        value: 22.12.0
      - key: AUTO_SEED
        value: "0"
      # Set the rest in the Render dashboard (Environment tab):
      # INSFORGE_URL, INSFORGE_API_KEY, NEBIUS_API_KEY, YOU_API_KEY,
      # VITE_INSFORGE_URL, VITE_INSFORGE_ANON_KEY, TAVILY_API_KEY (optional)
